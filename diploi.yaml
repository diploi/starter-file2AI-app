# This file is used to build the infrastructure for a deployment.
# After editing something here, apply the changes on the Diploi dashboard.
# For more information, see https://diploi.com/yaml

diploiVersion: v1.0
components:
  - name: React + Vite
    identifier: react-vite
    package: https://github.com/diploi/component-react-vite#v19.1.1
    env:
      include:
        - fastapi.APP_ENDPOINT:VITE_API_ROOT_ENDPOINT
  - name: FastAPI
    identifier: fastapi
    package: https://github.com/diploi/component-fastapi#v0.116.1
    env: 
      include:
        - name: DIPLOI_AI_GATEWAY_URL
          value: '{diploi-ai-gateway-url}'
        - name: DIPLOI_AI_GATEWAY_TOKEN
          value: '{diploi-ai-gateway-token}'
addons: []
